version: "2"
run:
  modules-download-mode: readonly
  tests: true
linters:
  enable:
    - bodyclose
    - copyloopvar
    - gocritic
    - gocyclo
    - gosec
    - misspell
    - revive
    - unconvert
    - unparam
    - whitespace
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 15
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - sayRepetitiveInsteadOfStutters
          disabled: true
  exclusions:
    generated: lax
    rules:
      - linters:
          - errcheck
          - gocritic
          - gosec
          - unparam
        path: _test\.go
      - linters:
          - all
        path: testdata/
      - linters:
          - gocritic
          - gocyclo
          - gosec
        path: msgtausch-simulation/
      - linters:
          - gocyclo
        path: msgtausch-srv/config/
        text: cyclomatic complexity.*is high
      - linters:
          - gocyclo
        path: msgtausch-srv/proxy/
        text: cyclomatic complexity.*is high
      - linters:
          - gocyclo
        path: msgtausch-srv/stats/
        text: cyclomatic complexity.*is high
      - linters:
          - gocyclo
        path: msgtausch-srv/dashboard/
        text: cyclomatic complexity.*is high
      - linters:
          - bodyclose
        path: _test\.go
        text: response body must be closed
      - linters:
          - errcheck
        path: _test\.go
        text: Error return value.*is not checked
      - linters:
          - errcheck
        text: Error return value.*proxy.*Stop.*is not checked
      - linters:
          - errcheck
        text: Error return value.*Close.*is not checked
      - linters:
          - errcheck
        text: Error return value.*fmt.Fprint.*is not checked
      - linters:
          - gocritic
        text: should be preferred to the nil request body
      - linters:
          - ineffassign
        path: _test\.go
        text: ineffectual assignment
      - linters:
          - unparam
        text: result.*is always nil
      - linters:
          - gocritic
        path: cmd/throughput-test/
        text: exitAfterDefer.*will not run
      - linters:
          - gosec
        text: TLS InsecureSkipVerify set true
      - linters:
          - gosec
        text: Potential Slowloris Attack
      - linters:
          - gosec
        text: TLS MinVersion too low
      - linters:
          - gosec
        text: integer overflow conversion
      - linters:
          - gosec
        path: cmd/throughput-test/
        text: Use of net/http serve function that has no support for setting timeouts
      - linters:
          - gosec
        text: SSRF via taint analysis
      - linters:
          - gosec
        text: XSS via taint analysis
      - linters:
          - gosec
        text: Path traversal via taint analysis
      - linters:
          - gosec
        text: Exported struct field.*Password.*matches secret pattern
      - linters:
          - gosec
        text: Potential hardcoded credentials
      - linters:
          - gosec
        path: cmd/memtest/
        text: Profiling endpoint is automatically exposed
      - linters:
          - gosec
        text: Errors unhandled
      - linters:
          - gosec
        path: cmd/memtest/
        text: Use of net/http serve function that has no support for setting timeouts
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
